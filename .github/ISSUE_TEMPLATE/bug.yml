name: Bug report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please fill in as much detail as possible to help us resolve the bug quickly.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Process Monitor & Manager are you using?
      placeholder: "e.g. 5.0.0"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - CLI (monitor.sh)
        - GUI (monitor.sh --gui)
        - Live Dashboard (dashboard.py)
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distribution / environment
      placeholder: "e.g. Ubuntu 22.04, or WSL2 Ubuntu + WSLg"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ./monitor.sh
        2. Select option ...
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      render: shell
