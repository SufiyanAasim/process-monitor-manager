name: Documentation
description: Report an issue with the documentation, or suggest an improvement
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "e.g. README.md, docs/deployment/Deployment.md"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
